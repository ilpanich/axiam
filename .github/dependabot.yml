# .github/dependabot.yml
# Automated dependency updates — D-16 (CONTEXT.md)
# Workspace + frontend + github-actions.
# The client SDKs live in their own repositories (ilpanich/axiam-<lang>-sdk) and
# each carries its own .github/dependabot.yml.
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    groups:
      minor-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
