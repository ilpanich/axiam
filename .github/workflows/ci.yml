name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace --all-targets -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo build --workspace

  build-no-saml:
    name: Build (SAML off / --no-default-features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Install ONLY protobuf-compiler. libxmlsec1-dev / libxml2-dev are
      # deliberately NOT installed: the `saml` feature (→ samael → libxmlsec1)
      # is off here, so if SAML ever leaks back into the default-off build the
      # compile must FAIL for lack of the native lib. This guards the very
      # configuration that lets the workspace build on hosts with an
      # incompatible system libxml2 (e.g. Arch 2.15.x).
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo check -p axiam-federation -p axiam-api-rest -p axiam-server --no-default-features

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # --- Rust toolchain (for cargo-audit and cargo-deny) ---
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install native build deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libxmlsec1-dev libxml2-dev

      # --- cargo audit ---
      - name: cargo audit
        uses: actions-rust-lang/audit@v1

      # --- cargo deny (advisories + licenses + bans + sources) ---
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

      # --- npm audit ---
      - name: npm audit
        working-directory: frontend
        run: |
          npm ci --ignore-scripts
          npm audit --audit-level=high

      # --- Hadolint Dockerfile lint ---
      - name: Hadolint server Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.server
          format: sarif
          output-file: hadolint-server.sarif
          no-fail: true

      - name: Hadolint frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.frontend
          format: sarif
          output-file: hadolint-frontend.sarif
          no-fail: true

      # --- Trivy filesystem scan (vuln — HIGH/CRITICAL, exit 1) ---
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-fs.sarif

      # --- Trivy config scan (Dockerfile/K8s misconfig — advisory, exit 0) ---
      - name: Trivy config scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          exit-code: '0'

      # --- Upload all SARIF results to GitHub Security tab (D-07) ---
      - name: Upload hadolint server SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint-server.sarif
          category: hadolint-server

      - name: Upload hadolint frontend SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: hadolint-frontend.sarif
          category: hadolint-frontend

      - name: Upload trivy filesystem SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload trivy config SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:4-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AXIAM_DATABASE__URL: "ws://localhost:8000"
      AXIAM_DATABASE__USERNAME: root
      AXIAM_DATABASE__PASSWORD: root
      AXIAM_AMQP__URL: "amqp://localhost:5672"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start SurrealDB
        run: |
          docker run -d --name surrealdb -p 8000:8000 \
            surrealdb/surrealdb:v3 start \
            --user root --pass root --log info
          for i in $(seq 1 30); do
            docker exec surrealdb /surreal isready 2>/dev/null && break || sleep 2
          done
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace
      # gRPC authz integration tests require the `client` feature (generated
      # client stubs). `cargo test --workspace` above skips them via
      # required-features; run them explicitly here so they execute as
      # compliance evidence (D-10, T19.1, T19.2 / SC#4).
      - run: cargo test -p axiam-api-grpc --features client --test grpc_authz_test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Start backend services (built from PR source)
        # --build forces the server image to be built from this PR's source code.
        # Using a pre-built registry image (ghcr.io/axiamhq/axiam/server:latest)
        # would produce false-green results on PR branches (W8 — stale image).
        run: docker compose -f docker/docker-compose.e2e.yml up -d --build --wait
        timeout-minutes: 15

      - name: Bootstrap E2E fixture (org + tenant + admin)
        run: bash scripts/e2e-bootstrap.sh
        env:
          E2E_ORG_SLUG: "test-org"
          E2E_TENANT_SLUG: "default"
          E2E_ADMIN_EMAIL: "admin@axiam.dev"
          E2E_ADMIN_PASSWORD: "Test@Admin123!"
          AXIAM_URL: "http://localhost:8090"
          SURREAL_URL: "http://localhost:8000"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install chromium

      - name: Serve frontend and run E2E tests
        working-directory: frontend
        run: |
          # Serve the production build on port 5173 for Playwright
          npx serve dist -l 5173 &
          SERVE_PID=$!
          # Wait for serve to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:5173 > /dev/null 2>&1 && break || sleep 2
          done
          npm test
          kill $SERVE_PID || true
        env:
          CI: "true"
          E2E_BASE_URL: "http://localhost:5173"
          E2E_ORG_SLUG: "test-org"
          E2E_TENANT_SLUG: "default"
          E2E_ADMIN_EMAIL: "admin@axiam.dev"
          E2E_ADMIN_PASSWORD: "Test@Admin123!"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

      - name: Stop backend services
        if: always()
        run: docker compose -f docker/docker-compose.e2e.yml down
