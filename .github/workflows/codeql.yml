# .github/workflows/codeql.yml
# First-party SAST via CodeQL (CI-04). Previously the repo only *uploaded*
# Trivy/Hadolint SARIF through codeql-action/upload-sarif; there was no actual
# codeql-action/init + analyze, so static analysis of the SDKs was not
# versioned/reproducible in-repo. This workflow makes SAST committed and gating
# for every CodeQL-supported language in the tree.
#
# Rust is not a CodeQL-supported language; its SAST substitute is the workspace
# `cargo clippy -D warnings` + `cargo audit`/`cargo deny` gates in ci.yml.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 07:17 UTC) to catch newly-published query updates.
    - cron: "17 7 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: java-kotlin
            build-mode: autobuild
          - language: csharp
            build-mode: autobuild
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: "/language:${{ matrix.language }}"
