name: Coverage

# Line coverage for the server workspace and the frontend unit suite,
# reported to Coveralls as a single parallel build.
#
# Runs on every PR and on every push to main. The main-branch runs are what
# establish the baseline Coveralls diffs a PR against, so both triggers are
# required — a PR-only workflow would have nothing to compare to.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-coverage:
    name: cargo-llvm-cov (server workspace) -> Coveralls
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:4-management-alpine
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_running"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AXIAM__DB__URL: "ws://localhost:8000"
      AXIAM__DB__USERNAME: root
      AXIAM__DB__PASSWORD: root
      AXIAM__AMQP__URL: "amqp://localhost:5672"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force || true
          df -h

      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c  # stable (2026-03-27)
        with:
          toolchain: stable
          # cargo-llvm-cov reads the profraw files the instrumented binaries
          # emit; llvm-tools ships the llvm-profdata/llvm-cov it shells out to.
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Start SurrealDB
        run: |
          docker run -d --name surrealdb -p 8000:8000 \
            surrealdb/surrealdb:v3 start \
            --user root --pass root --log info
          for i in $(seq 1 30); do
            docker exec surrealdb /surreal isready 2>/dev/null && break || sleep 2
          done

      # libxmlsec1-dev / libxml2-dev are required by the `saml` feature
      # (→ samael → libxmlsec1), which is on by default. Without them the
      # samael build script fails ("xmlsec1-config not found").
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libxmlsec1-dev libxml2-dev

      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853  # v2.83.2
        with:
          tool: cargo-llvm-cov

      # Mirrors the `test` job in ci.yml: default feature set (not
      # --all-features), --no-fail-fast for the workspace suite, plus the
      # gRPC authz integration tests that require the `client` feature and
      # are excluded from the workspace run via required-features.
      - name: Collect coverage (workspace)
        run: cargo llvm-cov --workspace --no-report --no-fail-fast

      # All three axiam-api-grpc integration tests carry required-features=["client"],
      # so they are skipped by the --workspace run above and must be instrumented
      # explicitly here. Previously only grpc_authz_test was collected, which left
      # UserService/TokenService (grpc_auth_test) and UserInfoService
      # (grpc_userinfo_test) uninstrumented despite having passing integration tests.
      - name: Collect coverage (gRPC client feature)
        run: cargo llvm-cov --no-report -p axiam-api-grpc --features client --test grpc_authz_test --test grpc_auth_test --test grpc_userinfo_test

      # axiam-server/src/main.rs is the binary composition root (~1000 lines of
      # process wiring: config load, DB/AMQP/HTTP/gRPC setup, task spawning,
      # graceful shutdown). It has no unit-testable logic — it is exercised only
      # end-to-end by the server integration tests, which llvm-cov does not
      # instrument through the spawned binary — so it sat at 0% and dragged the
      # workspace number down without reflecting real test quality. Exclude it
      # from both the Coveralls report and the regression gate; the testable
      # seams (cleanup::run_erasure_pipeline, tls::build_rustls_server_config)
      # live in lib.rs and stay measured.
      - name: Generate lcov report
        run: cargo llvm-cov report --lcov --output-path lcov.info --ignore-filename-regex 'crates/axiam-server/src/main\.rs'

      # Regression gate: fail the build if workspace line coverage drops below
      # the floor. Current raw cargo-llvm-cov line coverage is ~78.7% (this is
      # the whole default-feature workspace; note it differs from the Coveralls
      # display number). The floor is set just below that so it never
      # false-fails; ratchet it upward as coverage rises (target: >=90%).
      # Reuses the profdata already collected above (no re-run).
      - name: Enforce coverage floor
        run: cargo llvm-cov report --fail-under-lines 77 --ignore-filename-regex 'crates/axiam-server/src/main\.rs'

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: lcov.info
          format: lcov
          flag-name: rust-workspace
          parallel: true

  frontend-coverage:
    name: vitest --coverage (frontend) -> Coveralls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Collect coverage
        working-directory: frontend
        run: npx vitest run --coverage --coverage.reporter=lcov

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: frontend/coverage/lcov.info
          format: lcov
          flag-name: frontend-vitest
          parallel: true
          base-path: frontend

  finish:
    name: "Coveralls: finalize parallel build"
    needs: [rust-coverage, frontend-coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Close parallel build
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2.3.7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          parallel-finished: true
