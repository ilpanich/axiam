name: Docs Publish

# Publishes the server's API documentation and the documentation landing page on
# the server's own tag.
#
# The client SDKs no longer live here — each one is its own repository
# (`ilpanich/axiam-<lang>-sdk`) and publishes its own API docs to its own GitHub
# Pages site (or gets them for free from its ecosystem: docs.rs for Rust,
# pkg.go.dev for Go, javadoc.io for Java). This workflow therefore only:
#
#   | Artifact | Docs host    | How it gets there                            |
#   |----------|--------------|----------------------------------------------|
#   | Server   | GitHub Pages | built here (rustdoc, workspace crates)       |
#   | Index    | GitHub Pages | built here — links out to each SDK's own docs|
#
# docs.rs will not build the server (axiam-server is a binary, not a published
# library), so its rustdoc is generated here.
#
# Each job writes ONLY its own subdirectory of the gh-pages branch
# (`keep_files: true`), so a deploy never clobbers the project website at the
# site root.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

# gh-pages is a single branch: serialize deploys so two tags pushed together
# cannot race each other's commit.
concurrency:
  group: docs-publish
  cancel-in-progress: false

jobs:
  # A release tag must be cut from main — see the same gate in release.yml.
  verify-tag-on-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Assert the tagged commit is an ancestor of origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} is not on origin/main — refusing to publish docs."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} is on origin/main."

  # ---------------------------------------------------------------------------
  # Server + workspace crates — rustdoc -> /server
  # ---------------------------------------------------------------------------
  docs-server:
    name: Server docs (rustdoc)
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable (2026-03-27)
        with:
          toolchain: stable
      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libxml2-dev libxmlsec1-dev libxmlsec1-openssl
      - name: Build rustdoc for the workspace
        run: |
          set -euo pipefail
          cargo doc --workspace --no-deps --all-features
          # rustdoc emits no root index.html for a multi-crate workspace; send
          # visitors to the composition root instead of a bare directory listing.
          echo '<meta http-equiv="refresh" content="0; url=axiam_server/index.html">' \
            > target/doc/index.html
      - name: Deploy to GitHub Pages (/server)
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/doc
          destination_dir: server
          keep_files: true
          commit_message: "docs(server): publish rustdoc for ${{ github.ref_name }}"

  # ---------------------------------------------------------------------------
  # Documentation landing page at /docs, linking every artifact's docs.
  # ---------------------------------------------------------------------------
  # Published under /docs (NOT the site root): the site root is owned by the
  # AXIAM project website (Phase 20 showcase site), so this job must never write
  # a root index.html or it would clobber the website's homepage. keep_files
  # preserves the /server subtree and the root website; this job only ever
  # writes its own /docs subtree.
  docs-index:
    name: Docs landing page
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Render index.html
        run: |
          set -euo pipefail
          mkdir -p _index_out
          cat > _index_out/index.html <<'HTML'
          <!doctype html>
          <meta charset="utf-8">
          <title>AXIAM — Documentation</title>
          <style>
            body { font-family: system-ui, sans-serif; max-width: 46rem; margin: 3rem auto; padding: 0 1rem; line-height: 1.6; }
            h1 { margin-bottom: 0 } p.sub { color: #666; margin-top: .25rem }
            td, th { text-align: left; padding: .4rem .9rem .4rem 0; border-bottom: 1px solid #eee; }
            code { background: #f5f5f5; padding: .1rem .3rem; border-radius: 3px; }
          </style>
          <h1>AXIAM</h1>
          <p class="sub">Access eXtended Identity and Authorization Management — API documentation.</p>
          <h2>Server</h2>
          <ul>
            <li><a href="../server/">Server &amp; workspace crates</a> (rustdoc)</li>
            <li><a href="https://github.com/ilpanich/axiam/tree/main/docs">Guides</a> — deployment, admin, PKI, API contracts (REST / gRPC / AMQP)</li>
          </ul>
          <h2>SDKs</h2>
          <p>Each SDK lives in its own repository and publishes its own documentation.</p>
          <table>
            <tr><th>Language</th><th>Repository</th><th>API reference</th><th>Package</th></tr>
            <tr><td>Rust</td><td><a href="https://github.com/ilpanich/axiam-rust-sdk">axiam-rust-sdk</a></td><td><a href="https://docs.rs/axiam-sdk">docs.rs</a></td><td><a href="https://crates.io/crates/axiam-sdk">crates.io</a></td></tr>
            <tr><td>Go</td><td><a href="https://github.com/ilpanich/axiam-go-sdk">axiam-go-sdk</a></td><td><a href="https://pkg.go.dev/github.com/ilpanich/axiam-go-sdk">pkg.go.dev</a></td><td>Go modules</td></tr>
            <tr><td>Java</td><td><a href="https://github.com/ilpanich/axiam-java-sdk">axiam-java-sdk</a></td><td><a href="https://javadoc.io/doc/io.github.ilpanich/axiam-sdk">javadoc.io</a></td><td>Maven Central</td></tr>
            <tr><td>Python</td><td><a href="https://github.com/ilpanich/axiam-python-sdk">axiam-python-sdk</a></td><td><a href="https://ilpanich.github.io/axiam-python-sdk/">API docs</a></td><td><a href="https://pypi.org/project/axiam-sdk/">PyPI</a></td></tr>
            <tr><td>TypeScript</td><td><a href="https://github.com/ilpanich/axiam-typescript-sdk">axiam-typescript-sdk</a></td><td><a href="https://ilpanich.github.io/axiam-typescript-sdk/">API docs</a></td><td><a href="https://www.npmjs.com/package/axiam-sdk">npm</a></td></tr>
            <tr><td>C#</td><td><a href="https://github.com/ilpanich/axiam-csharp-sdk">axiam-csharp-sdk</a></td><td><a href="https://ilpanich.github.io/axiam-csharp-sdk/">API docs</a></td><td><a href="https://www.nuget.org/packages/Axiam.Sdk">NuGet</a></td></tr>
            <tr><td>PHP</td><td><a href="https://github.com/ilpanich/axiam-php-sdk">axiam-php-sdk</a></td><td><a href="https://ilpanich.github.io/axiam-php-sdk/">API docs</a></td><td><a href="https://packagist.org/packages/axiam/axiam-sdk">Packagist</a></td></tr>
          </table>
          <p>Every SDK implements the same
            <a href="https://github.com/ilpanich/axiam/blob/main/sdks/CONTRACT.md">SDK contract</a>,
            which is maintained here and mirrored into each SDK repository.</p>
          HTML
      - name: Deploy landing page to GitHub Pages (/docs)
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_index_out
          destination_dir: docs
          keep_files: true
          commit_message: "docs: refresh documentation index for ${{ github.ref_name }}"
