name: Release

on:
  push:
    tags:
      - "axiam-server/v*"

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # Gate: a release tag must point at a commit that is on main.
  # ---------------------------------------------------------------------------
  # Git tags are not branch-scoped — `git tag v1.0.0` on a feature branch would
  # otherwise publish a signed, attested image from unreviewed code. Every
  # publishing job below `needs:` this gate.
  verify-tag-on-main:
    name: Verify tag is on main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      - name: Assert the tagged commit is an ancestor of origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA}, which is NOT on origin/main. Release tags must be cut from main."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} (${GITHUB_SHA}) is on origin/main."

  # ---------------------------------------------------------------------------
  # Build each image, once per architecture, on a NATIVE runner.
  # ---------------------------------------------------------------------------
  # linux/arm64 covers Raspberry Pi 5 (Cortex-A76, aarch64), Apple Silicon and
  # AWS Graviton. It is built on GitHub's native `ubuntu-24.04-arm` runner
  # rather than under QEMU: emulating a full Rust release build costs hours,
  # while a native arm64 runner costs the same as amd64 (and is free for public
  # repositories).
  #
  # Each matrix leg pushes an untagged, digest-addressed manifest; the merge job
  # below assembles them into ONE multi-arch tag. `docker pull .../server:1.0.0`
  # then resolves to the caller's architecture automatically.
  build-images:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    needs: verify-tag-on-main
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: [server, frontend]
        # `platform` MUST be its own matrix dimension so the build fans out to
        # the full cross product image × platform = 4 jobs (server/frontend ×
        # amd64/arm64). If the platforms live only under `include:` (with no
        # base `platform` key), GitHub treats arch/runner as *added* values and
        # the second include entry overwrites the first on every image combo —
        # collapsing the matrix to arm64-only and silently dropping amd64. The
        # `include:` block below then just attaches arch+runner to each existing
        # platform combo (matching by the original `platform` value).
        platform: [linux/amd64, linux/arm64]
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # D-06 Step 1: build locally (load: true, no push) for scanning. The
      # runner is native for this arch, so `load` works — no QEMU needed.
      - name: Build image (scan target)
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          platforms: ${{ matrix.platform }}
          load: true
          tags: axiam-${{ matrix.image }}:scan-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      # D-06 Step 2: scan — block on HIGH/CRITICAL fixable vulns before push.
      # Runs per architecture: an arm64 image can carry different package
      # versions (and therefore different CVEs) than its amd64 sibling.
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: image
          image-ref: axiam-${{ matrix.image }}:scan-${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          format: sarif
          output: trivy-image-${{ matrix.image }}-${{ matrix.arch }}.sarif

      # D-07: upload SARIF to GitHub Security tab. The category must be unique
      # per image AND per arch, or the second upload overwrites the first.
      - name: Upload image scan SARIF
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4
        if: always()
        with:
          sarif_file: trivy-image-${{ matrix.image }}-${{ matrix.arch }}.sarif
          category: trivy-image-${{ matrix.image }}-${{ matrix.arch }}

      # D-06 Step 3: push by digest (no tag). Same GHA cache scope as the scan
      # build → same layers → the digest published here is the image that was
      # just scanned.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4  # v6.15.0
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.image }}
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: digests-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Assemble the per-arch digests into one multi-arch tag, then sign + attest.
  # ---------------------------------------------------------------------------
  # cosign signs (and provenance attests) the manifest LIST digest, so a single
  # signature covers both architectures — `cosign verify .../server:1.0.0`
  # succeeds regardless of which arch the verifier pulls.
  merge-images:
    name: Merge + sign ${{ matrix.image }} (multi-arch)
    needs: build-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        image: [server, frontend]
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true
          path: /tmp/digests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0

      - name: Log in to Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Classify the release: a prerelease tag (e.g. axiam-server/v1.0.0-alpha)
      # carries a version with a SemVer pre-release segment. We strip the
      # namespaced `axiam-server/v` prefix FIRST, so the only `-` that can
      # remain is the pre-release separator (the "axiam-server" prefix itself
      # contains hyphens and must not be mistaken for one).
      - name: Classify release (stable vs pre-release)
        id: rel
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#axiam-server/v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          if [[ "${version}" == *-* ]]; then
            echo "stable=false" >> "$GITHUB_OUTPUT"
            echo "Pre-release ${version}: image gets the exact version tag only (no moving tags)."
          else
            echo "stable=true" >> "$GITHUB_OUTPUT"
            echo "Stable ${version}: image gets version, major.minor and latest tags."
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          # `type=semver` CANNOT be used here: it parses the git tag as a bare
          # semver, and our release tag is namespaced (axiam-server/v1.0.0), so
          # it would fail to match and emit no version tag at all. We take the
          # version out of the prefixed tag explicitly (computed in the step
          # above) and publish it verbatim — so a pre-release like
          # axiam-server/v1.0.0-alpha ships as the image tag "1.0.0-alpha"
          # rather than silently collapsing to "1.0.0".
          #
          # The moving convenience tags (major.minor + latest) are applied ONLY
          # to stable releases: a pre-release must never claim the "1.0",
          # "1.0.0" or "latest" tag it is not.
          # Stable  axiam-server/v1.2.3      -> "1.2.3", "1.2", "latest" (+ sha)
          # Prerel. axiam-server/v1.0.0-alpha -> "1.0.0-alpha" (+ sha)
          tags: |
            type=raw,value=${{ steps.rel.outputs.version }}
            type=match,pattern=axiam-server/v(\d+\.\d+),group=1,enable=${{ steps.rel.outputs.stable == 'true' }}
            type=sha
          flavor: |
            latest=${{ steps.rel.outputs.stable == 'true' }}

      - name: Create multi-arch manifest list
        working-directory: /tmp/digests
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
        run: |
          set -euo pipefail
          # One -t per tag from metadata-action, one source ref per arch digest.
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Resolve manifest-list digest
        id: index
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
        run: |
          set -euo pipefail
          digest="$(docker buildx imagetools inspect "${IMAGE}:${{ steps.meta.outputs.version }}" --format '{{json .Manifest}}' | jq -r .digest)"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Multi-arch index digest: ${digest}"
          docker buildx imagetools inspect "${IMAGE}:${{ steps.meta.outputs.version }}" | grep -E "Name|MediaType|Platform"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      # D-06: sign the manifest-list digest (after push, after passing scan)
      - name: Sign image with cosign
        run: cosign sign --yes ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}@${{ steps.index.outputs.digest }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          subject-digest: ${{ steps.index.outputs.digest }}

  # Standalone binary tarballs, one per architecture, built natively (same
  # rationale as the images: no QEMU). Keeps the bare-metal install path in
  # step with the multi-arch container images.
  build-binary:
    name: Build Release Binary (${{ matrix.arch }})
    needs: verify-tag-on-main
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable (2026-03-27)
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libxml2-dev libxmlsec1-dev libxmlsec1-openssl

      - name: Build release binary
        run: cargo build --release -p axiam-server

      - name: Strip binary
        run: strip target/release/axiam-server

      - name: Create tarball
        run: tar czf "axiam-server-${{ matrix.arch }}-linux.tar.gz" -C target/release axiam-server

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: axiam-server-${{ matrix.arch }}-linux
          path: axiam-server-${{ matrix.arch }}-linux.tar.gz

  release:
    name: Create GitHub Release
    needs: [merge-images, build-binary]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0

      # Both arch tarballs (x86_64 + aarch64) land flat in the working dir.
      - name: Download binary artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          pattern: axiam-server-*-linux
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5  # v4
        with:
          args: --latest
        env:
          OUTPUT: CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228  # v3.0.2
        with:
          body_path: CHANGELOG.md
          files: |
            axiam-server-x86_64-linux.tar.gz
            axiam-server-aarch64-linux.tar.gz
          generate_release_notes: false
