name: SDK buf Gates

on:
  pull_request:
    branches: [main]
    paths:
      - 'proto/**'
      - 'buf.yaml'

permissions:
  contents: read

jobs:
  buf-lint-breaking:
    name: buf lint + breaking (proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - name: buf lint + breaking
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff  # v1.4.0
        with:
          input: .
          lint: true
          breaking: true
          breaking_against: "https://github.com/ilpanich/axiam.git#branch=main,subdir=proto"
          # This job only has contents:read; disable the auto PR comment so the
          # action does not fail with "Resource not accessible by integration".
          pr_comment: false
          # buf format is enforced via the format:true default; keep it explicit.
          format: true
