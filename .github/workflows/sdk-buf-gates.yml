name: SDK buf Gates

on:
  pull_request:
    branches: [main]
    paths:
      - 'proto/**'
      - 'sdks/buf.yaml'
      - 'sdks/buf.gen.yaml'

permissions:
  contents: read

jobs:
  buf-lint-breaking:
    name: buf lint + breaking (proto)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: buf lint + breaking
        uses: bufbuild/buf-action@v1.4.0
        with:
          input: sdks
          lint: true
          breaking: true
          breaking_against: "https://github.com/axiam/axiam.git#branch=main,subdir=proto"
