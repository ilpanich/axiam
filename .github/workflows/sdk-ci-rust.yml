name: SDK CI — Rust

on:
  pull_request:
    branches: [main]
    paths:
      - 'sdks/rust/**'
      - 'sdks/openapi.json'
      - 'sdks/buf.yaml'
      - 'sdks/buf.gen.yaml'
  push:
    tags:
      - 'sdks/rust/v*'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  scaffold-check:
    name: SDK Scaffold Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Verify LICENSE file
        run: test -f sdks/rust/LICENSE

  test:
    name: Test (${{ matrix.toolchain }})
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # D-10: MSRV (1.88, from Cargo.toml's rust-version) is CI-enforced
        # alongside the normal stable toolchain.
        toolchain: ["1.88", stable]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable (2026-03-27)
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.8
        with:
          workspaces: sdks/rust

      # build.rs runs tonic-prost-build gRPC codegen (grpc feature, pulled in
      # by --all-features), which shells out to protoc. Without it, codegen
      # is skipped and the crate's include!("../gen/axiam.v1.rs") fails to
      # compile. Ubuntu's protobuf-compiler is sufficient for prost/tonic.
      - name: Install protoc (build.rs gRPC codegen)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build (all features)
        working-directory: sdks/rust
        run: cargo build -p axiam-sdk --all-features

      - name: Test (all features)
        working-directory: sdks/rust
        run: cargo test -p axiam-sdk --all-features

      - name: Build examples (all features)
        working-directory: sdks/rust
        run: cargo build -p axiam-sdk --examples --all-features

      # SC#3 / T-16-22: no JWT-shaped ("eyJ"-prefixed) token strings may
      # appear anywhere in this SDK's own compiled debug artifacts —
      # Sensitive<T> (16-01) must keep token values out of debug output.
      - name: Leak gate — no JWT-shaped strings in compiled artifacts (SC#3)
        working-directory: sdks/rust
        run: |
          if grep -r 'eyJ' target/debug/ 2>/dev/null | grep -v '^Binary file' | grep -q .; then
            echo "FAIL: found 'eyJ'-prefixed (JWT-shaped) strings in sdks/rust/target/debug/"
            grep -r 'eyJ' target/debug/ 2>/dev/null | grep -v '^Binary file' || true
            exit 1
          fi
          echo "OK: no JWT-shaped strings found in sdks/rust/target/debug/"

      # §6 / T-16-23: strict TLS is always on; the only escape hatch is
      # with_custom_ca(pem) — there must be no insecure/skip-verification
      # surface anywhere in the SDK's own source tree.
      - name: TLS-lint gate — no TLS-bypass patterns (§6)
        working-directory: sdks/rust
        run: |
          if grep -rniE 'danger_accept_invalid_certs|insecureskipverify|skip_tls|allow_insecure|verify_peer\(false\)' src/ 2>/dev/null | grep -q .; then
            echo "FAIL: found a TLS-bypass pattern under sdks/rust/src/"
            grep -rniE 'danger_accept_invalid_certs|insecureskipverify|skip_tls|allow_insecure|verify_peer\(false\)' src/ || true
            exit 1
          fi
          echo "OK: no TLS-bypass patterns found under sdks/rust/src/"

      # SC#5 / T-16-24: the gRPC stubs must be generated BEFORE packaging so
      # the extracted package tarball (which has no access to ../../proto)
      # can compile standalone — build.rs's tonic-prost-build codegen is the
      # local equivalent of the repository's `buf generate` pipeline
      # (sdks/buf.gen.yaml targets the same rust/src/gen output), and is
      # invoked here simply by building with the grpc feature enabled.
      - name: Pre-generate gRPC stubs (build.rs codegen)
        working-directory: sdks/rust
        run: cargo build -p axiam-sdk --features grpc

      # --allow-dirty is required here (not a shortcut around verification):
      # src/gen/ is gitignored (16-01/D-09 — generated stubs are never
      # committed), but cargo package's dirty-check still flags it as
      # "uncommitted" because it is a real, present file included via the
      # Cargo.toml `include` list. This does not weaken the gate — the
      # actual package contents and compile-from-tarball verification below
      # are unaffected; only cargo's git-cleanliness pre-check is bypassed
      # for this one known-generated, intentionally-gitignored path.
      - name: Dry-run publish gate (SC#5)
        working-directory: sdks/rust
        run: cargo publish --dry-run -p axiam-sdk --all-features --allow-dirty

  publish:
    name: Publish to crates.io
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdks/rust/v')
    runs-on: ubuntu-latest
    # Manual-on-tag, side-effecting step: this job only runs when a
    # maintainer pushes a tag matching sdks/rust/vX.Y.Z (D-13 monorepo tag
    # convention). It is never triggered by a PR, so CARGO_REGISTRY_TOKEN is
    # never exposed to PR-triggered jobs (T-16-26).
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9  # stable (2026-03-27)
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6  # v2.7.8
        with:
          workspaces: sdks/rust

      - name: Install protoc (build.rs gRPC codegen)
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      # D-09: regenerate-and-bundle the gRPC stubs before publishing so
      # crates.io consumers (who cannot run buf) get a self-contained crate.
      # build.rs's tonic-prost-build codegen targets the same src/gen output
      # directory as the repository's `buf generate` pipeline
      # (sdks/buf.gen.yaml); either codegen path produces an equivalent
      # axiam.v1 module. Enabling the grpc feature is sufficient to trigger
      # it — no separate buf CLI invocation is required in this job.
      - name: Regenerate gRPC stubs for the published artifact (D-09)
        working-directory: sdks/rust
        run: cargo build -p axiam-sdk --features grpc

      # See the test job's Dry-run publish gate step comment: --allow-dirty
      # is required solely because the gitignored, build.rs-generated
      # src/gen/ is present-but-uncommitted by design (16-01/D-09).
      - name: Verify package before publish (SC#5)
        working-directory: sdks/rust
        run: cargo publish --dry-run -p axiam-sdk --all-features --allow-dirty

      - name: Publish to crates.io
        working-directory: sdks/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p axiam-sdk --all-features --allow-dirty
