# Trivy ignore file (YAML format) — scoped suppressions.
# Docs: https://trivy.dev/latest/docs/configuration/filtering/#by-finding-ids
#
# Wired into the "Trivy filesystem scan" step in .github/workflows/ci.yml via
# the `trivyignores` input. Keep every entry scoped (path-pinned) and documented.

secrets:
  # Trivy's built-in `private-key` rule (title: "Asymmetric Private Key") flags
  # the Ed25519 PEM literals embedded in these unit-test modules. They are
  # throwaway test fixtures (generated with `openssl genpkey -algorithm Ed25519`),
  # live inside `#[cfg(test)]` blocks, and are explicitly labelled "NOT secret".
  # They sign tokens only in tests. Real secret detection remains active here via
  # the dedicated GitGuardian check and Trivy's rule everywhere else in the tree.
  # Review date: 2026-06-21.
  - id: private-key
    paths:
      - "crates/axiam-auth/src/token.rs"
      - "crates/axiam-api-rest/src/extractors/auth.rs"
      - "crates/axiam-federation/src/oidc.rs"

misconfigurations:
  # Residual k8s findings that cannot be fixed by manifest hardening (the HIGH
  # KSV-0118 pod-securityContext finding WAS fixed in the manifests). These are
  # structural, not defects, so they are scoped to the specific manifests:
  #   AVD-KSV-0125 — "untrusted registry": ghcr.io is the project's own GitHub
  #     Container Registry; Trivy's trusted-registry list is scanner policy, not
  #     a manifest field. Applies to both deployment manifests.
  #   AVD-KSV-0020 / AVD-KSV-0021 — runAsUser/runAsGroup must be > 10000: the
  #     frontend uses nginxinc/nginx-unprivileged, whose writable dirs are owned
  #     by GID 0 and which runs as UID/GID 101; forcing > 10000 breaks the
  #     container at runtime. Scoped to the frontend manifest only.
  # Review date: 2026-06-21.
  # IDs are listed in every Trivy ID format (AVD-prefixed, dashed, and compact)
  # to be robust across trivy-action versions. These specific checks only fire
  # on the two k8s deployment manifests, so an ID-only ignore effectively scopes
  # to exactly the residual findings without depending on path-glob matching.
  - id: AVD-KSV-0125
  - id: KSV-0125
  - id: KSV0125
  - id: AVD-KSV-0020
  - id: KSV-0020
  - id: KSV0020
  - id: AVD-KSV-0021
  - id: KSV-0021
  - id: KSV0021
