# Benchmark target: AXIAM (resource-capped).
#
# Mirrors docker/docker-compose.prod.yml but pins CPU/memory caps so that
# "performance per resource" is meaningful and equal across targets. An optional
# profile-driven TLS terminator (nginx) fronts the server for the p1/p2/p3
# security profiles; for p0-plaintext it is left out and k6 hits :8090 directly.
#
# Caps default to 2 CPU / 1 GiB for the server and are overridable:
#   BENCH_CPUS=2 BENCH_MEM=1024m BENCH_DB_MEM=1024m
#
# Secrets (JWT keys, DB/AMQP creds) are sourced the same way as `just prod-up`;
# runner/run-benchmark.sh sources docker/.secrets before invoking compose.
name: bench-axiam

services:
  axiam-server:
    # Prefer the published multi-arch image so a benchmark run needs no local
    # source build — bumping BENCH_CPUS/BENCH_MEM then just restarts the same
    # image, which makes scaling the resource envelope up/down fast. The release
    # pipeline publishes ghcr.io/<owner>/<repo>/server:<version> (prereleases get
    # the exact version tag). `just bench-up` sets BENCH_AXIAM_IMAGE to the current
    # workspace version automatically; the literal below is only a fallback for a
    # raw `docker compose` invocation. Note GHCR packages are private by default —
    # `docker login ghcr.io` (or make the package public) to pull. Force a local
    # build instead with `just target=axiam build=1 bench-up`; the `build` block
    # below is also an automatic fallback when the image can't be pulled.
    image: ${BENCH_AXIAM_IMAGE:-ghcr.io/ilpanich/axiam/server:1.0.0-alpha9}
    pull_policy: ${BENCH_AXIAM_PULL_POLICY:-missing}
    build:
      context: ../../..
      dockerfile: docker/Dockerfile.server
    container_name: bench-axiam-server
    cpus: ${BENCH_CPUS:-2}
    mem_limit: ${BENCH_MEM:-1024m}
    ports:
      - "${BENCH_APP_PORT:-8090}:8090"
      - "${BENCH_GRPC_PORT:-50051}:50051"
    environment:
      AXIAM__DB__URL: "surrealdb:8000"
      AXIAM__DB__USERNAME: "${AXIAM__DB__USERNAME:?run via runner/run-benchmark.sh which sources docker/.secrets}"
      AXIAM__DB__PASSWORD: "${AXIAM__DB__PASSWORD:?run via runner/run-benchmark.sh which sources docker/.secrets}"
      AXIAM__DB__NAMESPACE: "axiam"
      # Aligned with docker/docker-compose.prod.yml (was "main").
      AXIAM__DB__DATABASE: "${AXIAM__DB__DATABASE:-axiam}"
      AXIAM__AMQP__URL: "amqp://${RABBITMQ_DEFAULT_USER:?required}:${RABBITMQ_DEFAULT_PASS:?required}@rabbitmq:5672"
      AXIAM__SERVER__HOST: "0.0.0.0"
      AXIAM__GRPC__HOST: "0.0.0.0"
      # First-run bootstrap gate (D-03a): satisfies the fail-closed admin gate so
      # runner/seed.sh can POST /api/v1/admin/bootstrap without a setup_token.
      # Bench-only; the production compose deliberately does not preset this.
      AXIAM_BOOTSTRAP_ADMIN_EMAIL: "${BENCH_ADMIN_EMAIL:-admin@bench.dev}"
      AXIAM__AUTH__JWT_PRIVATE_KEY_PEM: "${AXIAM__AUTH__JWT_PRIVATE_KEY_PEM:?required}"
      AXIAM__AUTH__JWT_PUBLIC_KEY_PEM: "${AXIAM__AUTH__JWT_PUBLIC_KEY_PEM:?required}"
      RUST_LOG: "${RUST_LOG:-axiam=warn}"
    depends_on:
      surrealdb: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "/usr/local/bin/axiam-server", "healthcheck"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: "no"
    networks: [bench]

  # Profile-driven TLS terminator. Enabled only for the `tls` compose profile
  # (p1/p2/p3). The runner selects which nginx conf to mount via BENCH_NGINX_CONF
  # (tls12.conf | tls13.conf | mtls.conf) and mounts the test certs read-only.
  tls-edge:
    image: nginx:1.27-alpine
    container_name: bench-axiam-tls
    profiles: ["tls"]
    cpus: ${BENCH_EDGE_CPUS:-1}
    mem_limit: ${BENCH_EDGE_MEM:-128m}
    ports:
      - "${BENCH_TLS_PORT:-8443}:8443"
    volumes:
      - ../../profiles/certs:/certs:ro
      - ./tls/${BENCH_NGINX_CONF:-tls13.conf}:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      axiam-server: { condition: service_healthy }
    restart: "no"
    networks: [bench]

  surrealdb-init:
    image: busybox
    command: ["sh", "-c", "chown -R 65532:65532 /data && chmod -R u+rwX /data"]
    volumes:
      - surrealdb-data:/data
    restart: "no"

  surrealdb:
    image: surrealdb/surrealdb:v3
    container_name: bench-axiam-surrealdb
    cpus: ${BENCH_DB_CPUS:-2}
    mem_limit: ${BENCH_DB_MEM:-1024m}
    depends_on:
      surrealdb-init: { condition: service_completed_successfully }
    command: start --user ${AXIAM__DB__USERNAME:?required} --pass ${AXIAM__DB__PASSWORD:?required} --log warn surrealkv:/data/axiam.db
    volumes:
      - surrealdb-data:/data
    healthcheck:
      test: ["CMD", "/surreal", "isready"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"
    networks: [bench]

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: bench-axiam-rabbitmq
    cpus: ${BENCH_MQ_CPUS:-1}
    mem_limit: ${BENCH_MQ_MEM:-512m}
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER:?required}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DEFAULT_PASS:?required}"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"
    networks: [bench]

volumes:
  surrealdb-data:

networks:
  bench:
    driver: bridge
