# p3-mtls: TLS 1.3 + mandatory X.509 client-certificate authentication.
# The client cert is verified against the test CA; the verified subject DN is
# forwarded to AXIAM so the certificate-based auth path can map it to a principal.
server {
    listen 8443 ssl;
    server_name localhost;
    http2 on;

    ssl_certificate     /certs/server.crt;
    ssl_certificate_key /certs/server.key;
    ssl_protocols TLSv1.3;

    # Mutual TLS: require + verify a client certificate signed by the test CA.
    ssl_client_certificate /certs/ca.crt;
    ssl_verify_client on;
    ssl_verify_depth 2;

    location / {
        # Reject any request that did not present a valid client cert.
        if ($ssl_client_verify != SUCCESS) { return 496; }

        proxy_pass http://axiam-server:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        # Forward verified client-cert identity for AXIAM's cert-based auth.
        proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
        proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Fingerprint $ssl_client_fingerprint;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
}
