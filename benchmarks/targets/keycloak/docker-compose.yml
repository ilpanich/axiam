# Benchmark target: Keycloak (resource-capped reference setup).
#
# Same CPU/memory envelope as the AXIAM target so resource efficiency is
# comparable. Keycloak terminates TLS natively (no separate edge), so the
# security profile maps onto its own KC_HTTPS_* / KC_HTTP_* settings, selected
# by the runner via the BENCH_* env it exports.
#
# Caps default to match the AXIAM target: server 2 CPU / 1 GiB, db 2 CPU / 1 GiB.
name: bench-keycloak

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    container_name: bench-keycloak
    cpus: ${BENCH_CPUS:-2}
    mem_limit: ${BENCH_MEM:-1024m}
    # Conditional startup wrapper. Two reasons it is a script, not a plain command:
    #  1. `start` (production), NOT `start --optimized`: the stock image has never
    #     had `kc.sh build` run, so `--optimized` fails on first start. Plain
    #     `start` auto-builds from the build-time env (KC_DB=postgres) on boot,
    #     then serves; the build touches only startup, not the request hot path.
    #  2. Keycloak REJECTS an empty value for KC_HTTPS_* options, so those can NOT
    #     be passed as always-present env with empty defaults (that was the
    #     "Invalid empty value for option 'KC_HTTPS_CERTIFICATE_KEY_FILE'" error).
    #     Instead we export them ONLY for https profiles, from the shared throwaway
    #     certs mounted at /certs (runner/gen-certs.sh) and the BENCH_* profile env.
    # `$$` keeps interpolation at container-runtime (not docker-compose config time).
    entrypoint: ["/bin/bash", "-ce"]
    command:
      - |
        ARGS=(start --http-enabled="$${BENCH_KC_HTTP_ENABLED:-true}")
        if [ "$${BENCH_SCHEME:-http}" = "https" ]; then
          export KC_HTTPS_CERTIFICATE_FILE=/certs/server.crt
          export KC_HTTPS_CERTIFICATE_KEY_FILE=/certs/server.key
          case "$${BENCH_TLS_MIN:-1.3}" in
            1.2) export KC_HTTPS_PROTOCOLS="TLSv1.2,TLSv1.3" ;;
            *)   export KC_HTTPS_PROTOCOLS="TLSv1.3" ;;
          esac
          if [ "$${BENCH_REQUIRE_CLIENT_CERT:-false}" = "true" ]; then
            # mTLS: require + verify the client cert against the throwaway CA.
            # KC 26 accepts a PEM CA via the System Truststore (--truststore-paths).
            export KC_HTTPS_CLIENT_AUTH=required
            export KC_TRUSTSTORE_PATHS=/certs/ca.crt
          fi
        fi
        exec /opt/keycloak/bin/kc.sh "$${ARGS[@]}"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KC_ADMIN:-admin}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KC_ADMIN_PASSWORD:-admin}"
      KC_DB: postgres
      KC_DB_URL: "jdbc:postgresql://postgres:5432/keycloak"
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      # Profile inputs consumed by the entrypoint wrapper above (which derives the
      # KC_HTTPS_* options from them). Passed as plain values — empty is harmless
      # here (unlike KC_HTTPS_*, which reject empty). Exported by profiles/p*.env.
      BENCH_SCHEME: "${BENCH_SCHEME:-http}"
      BENCH_TLS_MIN: "${BENCH_TLS_MIN:-}"
      BENCH_REQUIRE_CLIENT_CERT: "${BENCH_REQUIRE_CLIENT_CERT:-false}"
      BENCH_KC_HTTP_ENABLED: "${BENCH_KC_HTTP_ENABLED:-true}"
    ports:
      - "${BENCH_APP_PORT:-8090}:8080"
      - "${BENCH_TLS_PORT:-8443}:8443"
    volumes:
      - ../../profiles/certs:/certs:ro
    depends_on:
      postgres: { condition: service_healthy }
    healthcheck:
      # TCP-open probe on the management port. It can NOT be an HTTP GET: with an
      # https profile Keycloak 26 serves the management interface over TLS too
      # ("Management interface listening on https://…:9000"), and the image has no
      # curl to do a TLS handshake — the old plaintext /dev/tcp GET then never sees
      # "200 OK" and the container false-fails as unhealthy. A bare TCP connect is
      # scheme-agnostic; real HTTP readiness is gated host-side by `just bench-up`
      # (curl -k …/realms/master until 200).
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000"]
      interval: 10s
      timeout: 5s
      retries: 15
      # Generous: first-ever `start` runs the one-time auto-build before serving,
      # which is slower under the 2-CPU cap.
      start_period: 90s
    restart: "no"
    networks: [bench]

  postgres:
    image: postgres:16-alpine
    container_name: bench-keycloak-postgres
    cpus: ${BENCH_DB_CPUS:-2}
    mem_limit: ${BENCH_DB_MEM:-1024m}
    # Minimal, uniform tuning applied identically to Zitadel's postgres (C2) —
    # sized for the standard 1 GiB cap, not a durability change (see the
    # durability-parity note in docs/methodology.md §7). Defaults left
    # otherwise stock so the comparison stays "same DB, sane settings", not
    # "tuned for AXIAM's benefit".
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "max_connections=200"
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"
    networks: [bench]

networks:
  bench:
    driver: bridge
