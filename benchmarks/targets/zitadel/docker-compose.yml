# Benchmark target: Zitadel (resource-capped reference setup).
#
# Same CPU/memory envelope as the other targets. Zitadel disables the
# resource-owner-password grant by default, so the comparative "login" scenario
# falls back to client_credentials (handled in scenarios/lib/targets.js). TLS mode
# is controlled by ZITADEL_TLS_* set by the runner from the security profile.
#
# Pinned to Zitadel v4 (GA). The OIDC endpoints the adapter uses
# (/oauth/v2/token, /oauth/v2/introspect, /oauth/v2/keys, /oidc/v1/userinfo) are
# standard discovery paths unchanged from v2; `start-from-init`, the masterkey
# flag, and the ZITADEL_DATABASE_*/EXTERNAL* env are all still valid in v4. v4
# does default to the new (v2) login UI, which does not affect these API flows —
# but validate a live v4 container before publishing any head-to-head numbers.
name: bench-zitadel

services:
  zitadel:
    image: ghcr.io/zitadel/zitadel:v4.15.2
    container_name: bench-zitadel
    cpus: ${BENCH_CPUS:-2}
    mem_limit: ${BENCH_MEM:-1024m}
    command: 'start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode ${BENCH_ZITADEL_TLS_MODE:-disabled}'
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: "5432"
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "${BENCH_ZITADEL_EXTERNAL_SECURE:-false}"
      ZITADEL_EXTERNALPORT: "${BENCH_APP_PORT:-8090}"
      ZITADEL_EXTERNALDOMAIN: localhost
      # First-init bootstrap of an admin service account + PAT so runner/seed.sh
      # can provision the benchmark client_credentials machine user unattended
      # (Zitadel has no scriptable password grant). These FIRSTINSTANCE_* vars
      # ONLY take effect on the very first init against an empty DB — `bench-down
      # -v` (volume wipe) is required for a re-provision. The PAT is written into
      # the `machinekey` volume; seed.sh reads it via `docker cp` (the distroless
      # image has no shell for `docker exec cat`).
      ZITADEL_FIRSTINSTANCE_PATPATH: /machinekey/pat.txt
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: bench-admin-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Bench Admin SA
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "9999-12-31T23:59:59Z"
    volumes:
      - machinekey:/machinekey
    ports:
      - "${BENCH_APP_PORT:-8090}:8080"
    depends_on:
      postgres: { condition: service_healthy }
      # A freshly-created named volume is root:root 0755, but the Zitadel image
      # runs non-root and must write the PAT into it — so open the perms first.
      machinekey-init: { condition: service_completed_successfully }
    restart: "no"
    networks: [bench]

  # One-shot: make the machinekey volume writable by Zitadel's non-root user
  # (UID-agnostic 0777) before it runs `start-from-init`. Exits 0 immediately;
  # `up -d --wait` gates on its successful completion.
  machinekey-init:
    image: busybox:1.37
    container_name: bench-zitadel-machinekey-init
    command: ["sh", "-c", "chmod 0777 /machinekey"]
    volumes:
      - machinekey:/machinekey
    restart: "no"
    networks: [bench]

  postgres:
    image: postgres:16-alpine
    container_name: bench-zitadel-postgres
    cpus: ${BENCH_DB_CPUS:-2}
    mem_limit: ${BENCH_DB_MEM:-1024m}
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: "no"
    networks: [bench]

volumes:
  machinekey:

networks:
  bench:
    driver: bridge
