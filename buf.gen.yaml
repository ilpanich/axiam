version: v2
managed:
  enabled: true
  override:
    # protoc-gen-go needs an import path; the protos carry no go_package
    # option, so managed mode supplies the prefix. Combined with
    # paths=source_relative below, axiam/v1/*.proto -> sdks/go/internal/gen/
    # axiam/v1/*.pb.go with package `axiamv1`.
    - file_option: go_package_prefix
      value: github.com/ilpanich/axiam/sdks/go/internal/gen
plugins:
  # Rust: prost (message codegen) + tonic (service codegen)
  # Verified against buf.build BSR — orchestrator-confirmed 2026-06-30
  - remote: buf.build/community/neoeinstein-prost
    out: sdks/rust/src/gen
    opt:
      - compile_well_known_types=true
  - remote: buf.build/community/neoeinstein-tonic
    out: sdks/rust/src/gen
    opt:
      - compile_well_known_types=true
      - no_include=true

  # TypeScript: ts-proto (@grpc/grpc-js compatible stubs)
  # Verified against buf.build BSR — orchestrator-confirmed 2026-06-30
  - remote: buf.build/community/stephenh-ts-proto
    out: sdks/typescript/src/gen
    opt:
      - target=ts
      - outputServices=grpc-js

  # Go: protobuf types + gRPC service stubs
  # Verified against buf.build BSR — orchestrator-confirmed 2026-06-30
  # D-01 (Phase 18) commits these stubs into the source tree under
  # internal/ so external packages cannot import them directly, bypassing
  # the SDK's public API (Phase 18 Pitfall 2 fix).
  - remote: buf.build/protocolbuffers/go
    out: sdks/go/internal/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: sdks/go/internal/gen
    opt:
      - paths=source_relative

  # Python and PHP are intentionally NOT generated by buf:
  #   * Python uses `python -m grpc_tools.protoc` via
  #     sdks/python/scripts/gen_grpc.sh (D-04, drift-checked separately) — its
  #     committed stubs live at sdks/python/src/axiam_sdk/grpc/gen.
  #   * PHP uses a manual `protoc --php_out` (D-03) into the flat PSR-4 root
  #     sdks/php/src/Grpc/Gen/ (matching Axiam\Sdk\Grpc\Gen).
  # Driving them through buf here produced a conflicting nested layout and an
  # unused output path. buf drives only the languages that consume it (Rust,
  # TypeScript, Go). Unifying all codegen under buf is tracked as T19.30.

  # Java: DRIFT-CHECK-ONLY reference — NOT the authoritative Java codegen
  # path (D-21). Java's actual gRPC codegen is
  # `mvn -f sdks/java/pom.xml generate-sources` via protobuf-maven-plugin +
  # os-maven-plugin, which self-downloads protoc/protoc-gen-grpc-java and
  # outputs into the gitignored sdks/java/target/generated-sources/protobuf.
  # Uncomment only for an optional CI drift-check comparing buf's output
  # against the Maven build's output — never as the build's source of truth.
  # - remote: buf.build/protocolbuffers/java
  #   out: sdks/java/src/main/java
  # - remote: buf.build/grpc/java
  #   out: sdks/java/src/main/java
