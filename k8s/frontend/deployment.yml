apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiam-frontend
  namespace: axiam
  labels:
    app: axiam
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: axiam
      component: frontend
  template:
    metadata:
      labels:
        app: axiam
        component: frontend
    spec:
      # Pod-level restricted security context (KSV-0118). nginx-unprivileged
      # runs as UID/GID 101; container-level contexts below remain authoritative.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: axiam-frontend
          # Pin a concrete tag, not :latest (KSV-0013). Update per release.
          image: ghcr.io/OWNER/frontend:1.0.0-alpha10
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            readOnlyRootFilesystem: true      # D-13: restricted profile (nginx-unprivileged supports this with emptyDir)
            allowPrivilegeEscalation: false   # D-13: restricted profile
            capabilities:
              drop:
                - ALL                 # D-13: restricted profile
            seccompProfile:
              type: RuntimeDefault    # D-13: restricted profile
          volumeMounts:
            - name: nginx-tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
