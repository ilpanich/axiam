apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiam-frontend
  namespace: axiam
  labels:
    app: axiam
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: axiam
      component: frontend
  template:
    metadata:
      labels:
        app: axiam
        component: frontend
    spec:
      containers:
        - name: axiam-frontend
          image: ghcr.io/OWNER/axiam-frontend:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: false
