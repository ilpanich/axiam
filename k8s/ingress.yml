apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: axiam-ingress
  namespace: axiam
  labels:
    app: axiam
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - axiam.example.com
      secretName: axiam-tls
  rules:
    - host: axiam.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: axiam-server
                port:
                  number: 8090
          # SEC-016: OAuth2 authorization server endpoints
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: axiam-server
                port:
                  number: 8090
          # SEC-016: OIDC/OAuth2 discovery endpoints (/.well-known/openid-configuration etc.)
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: axiam-server
                port:
                  number: 8090
          - path: /
            pathType: Prefix
            backend:
              service:
                name: axiam-frontend
                port:
                  number: 80

# SEC-003 (T-09-05): Public gRPC ingress removed — port 50051 is
# reachable only in-cluster via the ClusterIP service in server/service.yml.
