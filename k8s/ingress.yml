apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: axiam-ingress
  namespace: axiam
  labels:
    app: axiam
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - axiam.example.com
      secretName: axiam-tls
  rules:
    - host: axiam.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: axiam-server
                port:
                  number: 8080
          - path: /grpc
            pathType: Prefix
            backend:
              service:
                name: axiam-server
                port:
                  number: 50051
          - path: /
            pathType: Prefix
            backend:
              service:
                name: axiam-frontend
                port:
                  number: 80
