apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: axiam

commonLabels:
  app: axiam

resources:
  - namespace.yml
  - server/deployment.yml
  - server/service.yml
  - server/hpa.yml
  - server/configmap.yml
  - server/secret.yml
  - frontend/deployment.yml
  - frontend/service.yml
  - ingress.yml
  - surrealdb/statefulset.yml
  - surrealdb/service.yml
  - surrealdb/secret.yml
  - rabbitmq/statefulset.yml
  - rabbitmq/service.yml
  - rabbitmq/secret.yml
  - network-policy/default-deny.yml
  - network-policy/allow-dns-egress.yml
  - network-policy/server-egress.yml
  - network-policy/allow-ingress-to-server.yml
  - network-policy/allow-ingress-to-frontend.yml
