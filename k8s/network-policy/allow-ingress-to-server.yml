apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-server
  namespace: axiam
spec:
  podSelector:
    matchLabels:
      component: server
  policyTypes:
    - Ingress
  ingress:
    # Allow ingress controller → server:8090 (D-11)
    # Adjust the namespaceSelector label to match your ingress controller namespace.
    # Common values: ingress-nginx, kube-ingress, or the namespace where your ingress controller runs.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx  # TODO: operator must adjust to match ingress controller namespace
      ports:
        - protocol: TCP
          port: 8090
