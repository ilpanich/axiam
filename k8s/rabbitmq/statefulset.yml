apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rabbitmq
  namespace: axiam
  labels:
    app: axiam
    component: rabbitmq
spec:
  serviceName: rabbitmq
  replicas: 1
  selector:
    matchLabels:
      app: axiam
      component: rabbitmq
  template:
    metadata:
      labels:
        app: axiam
        component: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:4-management-alpine
          env:
            - name: RABBITMQ_DEFAULT_USER
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: username
            - name: RABBITMQ_DEFAULT_PASS
              valueFrom:
                secretKeyRef:
                  name: rabbitmq-credentials
                  key: password
          securityContext:
            runAsNonRoot: true
            # D-13 best-effort: RabbitMQ default UID is 999 (rabbitmq user in official image)
            # If volume permission errors occur at runtime, add an initContainer: chown 999:999 /var/lib/rabbitmq
            runAsUser: 999
            allowPrivilegeEscalation: false   # D-13: restricted profile
            capabilities:
              drop:
                - ALL                 # D-13: restricted profile
            seccompProfile:
              type: RuntimeDefault    # D-13: restricted profile
          ports:
            - containerPort: 5672
              name: amqp
              protocol: TCP
            - containerPort: 15672
              name: management
              protocol: TCP
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_running"]
            initialDelaySeconds: 20
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["rabbitmq-diagnostics", "check_running"]
            initialDelaySeconds: 60
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: rabbitmq-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
