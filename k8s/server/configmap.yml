apiVersion: v1
kind: ConfigMap
metadata:
  name: axiam-config
  namespace: axiam
  labels:
    app: axiam
    component: server
data:
  AXIAM_DATABASE__URL: "ws://surrealdb:8000"
  AXIAM_DATABASE__NAMESPACE: "axiam"
  AXIAM_DATABASE__DATABASE: "axiam"
  AXIAM_AMQP__URL: "amqp://rabbitmq:5672"
  RUST_LOG: "info,axiam=debug"
