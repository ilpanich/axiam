apiVersion: apps/v1
kind: Deployment
metadata:
  name: axiam-server
  namespace: axiam
  labels:
    app: axiam
    component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: axiam
      component: server
  template:
    metadata:
      labels:
        app: axiam
        component: server
    spec:
      # Pod-level restricted security context (KSV-0118). Container-level
      # contexts below remain authoritative; this satisfies the pod-scope check.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: axiam-server
          # Pin a concrete tag, not :latest (KSV-0013). Update per release.
          image: ghcr.io/OWNER/server:1.0.0-alpha2
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 30
          envFrom:
            - configMapRef:
                name: axiam-config
            - secretRef:
                name: axiam-secrets
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532          # distroless/cc-debian12:nonroot UID (D-08)
            runAsGroup: 65532         # KSV-0021: non-root GID > 10000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false   # D-13: restricted profile
            capabilities:
              drop:
                - ALL                 # D-13: restricted profile
            seccompProfile:
              type: RuntimeDefault    # D-13: restricted profile
