apiVersion: v1
kind: Secret
metadata:
  name: axiam-secrets
  namespace: axiam
  labels:
    app: axiam
    component: server
type: Opaque
data:
  # Intentionally left blank — provide real values at deploy time
  # (e.g., via CI/CD secrets, sealed-secrets, or external-secrets operator).
  # All keys use DOUBLE underscore after AXIAM (AXIAM__) — SEC-052.
  AXIAM__DB__USERNAME: ""
  AXIAM__DB__PASSWORD: ""
  # JWT Ed25519 signing keys — base64-encoded PEM.
  # Generate with: just gen-jwt-keys
  AXIAM__AUTH__JWT_PRIVATE_KEY_PEM: ""
  AXIAM__AUTH__JWT_PUBLIC_KEY_PEM: ""
  # AES-256-GCM encryption keys — 32 bytes, hex-encoded.
  # Generate with: openssl rand -hex 32
  AXIAM__AUTH__MFA_ENCRYPTION_KEY: ""
  AXIAM__PKI__ENCRYPTION_KEY: ""
  # AES-256-GCM key (32 bytes, hex-encoded) for federation client-secret
  # encryption at rest (SECHRD-09). Generate with: openssl rand -hex 32
  AXIAM__AUTH__FEDERATION_ENCRYPTION_KEY: ""
  # AES-256-GCM key (32 bytes, hex-encoded) for email/SMTP provider secret
  # encryption at rest (D-17). Generate with: openssl rand -hex 32
  AXIAM__EMAIL_ENCRYPTION_KEY: ""
  # HMAC-SHA256 pepper (32 bytes, hex-encoded) for GDPR audit actor
  # pseudonymization (D-02). Generate with: openssl rand -hex 32
  AXIAM__GDPR_PSEUDONYM_PEPPER: ""
  # Password pepper (plain string, prepended before Argon2id hashing).
  # REQ-14 AC-1. Generate a long random string, e.g.: openssl rand -base64 32
  AXIAM__AUTH__PEPPER: ""
