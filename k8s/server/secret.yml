apiVersion: v1
kind: Secret
metadata:
  name: axiam-secrets
  namespace: axiam
  labels:
    app: axiam
    component: server
type: Opaque
data:
  # Intentionally left blank — provide real values at deploy time
  # (e.g., via CI/CD secrets, sealed-secrets, or external-secrets operator).
  # All keys use DOUBLE underscore after AXIAM (AXIAM__) — SEC-052.
  AXIAM__DB__USERNAME: ""
  AXIAM__DB__PASSWORD: ""
  # JWT Ed25519 signing keys — base64-encoded PEM.
  # Generate with: just gen-jwt-keys
  AXIAM__AUTH__JWT_PRIVATE_KEY_PEM: ""
  AXIAM__AUTH__JWT_PUBLIC_KEY_PEM: ""
  # AES-256-GCM encryption keys — 32 bytes, hex-encoded.
  # Generate with: openssl rand -hex 32
  AXIAM__AUTH__MFA_ENCRYPTION_KEY: ""
  AXIAM__PKI__ENCRYPTION_KEY: ""
