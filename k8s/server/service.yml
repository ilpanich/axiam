apiVersion: v1
kind: Service
metadata:
  name: axiam-server
  namespace: axiam
  labels:
    app: axiam
    component: server
spec:
  type: ClusterIP
  selector:
    app: axiam
    component: server
  ports:
    - name: http
      port: 8090
      targetPort: 8090
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
