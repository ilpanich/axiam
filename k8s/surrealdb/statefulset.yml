apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: surrealdb
  namespace: axiam
  labels:
    app: axiam
    component: surrealdb
spec:
  serviceName: surrealdb
  replicas: 1
  selector:
    matchLabels:
      app: axiam
      component: surrealdb
  template:
    metadata:
      labels:
        app: axiam
        component: surrealdb
    spec:
      containers:
        - name: surrealdb
          image: surrealdb/surrealdb:v3
          command: ["surreal"]
          args:
            - "start"
            - "--user"
            - "$(SURREALDB_USER)"
            - "--pass"
            - "$(SURREALDB_PASS)"
            - "--log"
            - "info"
            - "file:/data/surreal.db"
          env:
            - name: SURREALDB_USER
              valueFrom:
                secretKeyRef:
                  name: surrealdb-credentials
                  key: username
            - name: SURREALDB_PASS
              valueFrom:
                secretKeyRef:
                  name: surrealdb-credentials
                  key: password
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532          # D-13 best-effort: surrealdb v3 nonroot UID (adjust if image uses different UID)
            allowPrivilegeEscalation: false   # D-13: restricted profile
            capabilities:
              drop:
                - ALL                 # D-13: restricted profile
            seccompProfile:
              type: RuntimeDefault    # D-13: restricted profile
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          volumeMounts:
            - name: surrealdb-data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["/surreal", "isready"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["/surreal", "isready"]
            initialDelaySeconds: 30
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: surrealdb-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
