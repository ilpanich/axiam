version: v2
plugins:
  # Rust: prost (message codegen) + tonic (service codegen)
  # Verified against buf.build BSR — orchestrator-confirmed 2026-06-30
  - remote: buf.build/community/neoeinstein-prost
    out: rust/src/gen
    opt:
      - compile_well_known_types=true
  - remote: buf.build/community/neoeinstein-tonic
    out: rust/src/gen
    opt:
      - compile_well_known_types=true
      - no_include=true

  # TypeScript: ts-proto (@grpc/grpc-js compatible stubs)
  # Verified against buf.build BSR — orchestrator-confirmed 2026-06-30
  - remote: buf.build/community/stephenh-ts-proto
    out: typescript/src/gen
    opt:
      - target=ts
      - outputServices=grpc-js

  # Go: protobuf types + gRPC service stubs
  # Verified against buf.build BSR — orchestrator-confirmed 2026-06-30
  # D-01 (Phase 18) commits these stubs into the source tree under
  # internal/ so external packages cannot import them directly, bypassing
  # the SDK's public API (Phase 18 Pitfall 2 fix).
  - remote: buf.build/protocolbuffers/go
    out: go/internal/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: go/internal/gen
    opt:
      - paths=source_relative

  # Python: protobuf types + gRPC service stubs
  # Verified against buf.build BSR — orchestrator-confirmed 2026-06-30
  - remote: buf.build/protocolbuffers/python
    out: python/axiam_sdk/gen
  - remote: buf.build/grpc/python
    out: python/axiam_sdk/gen

  # PHP: protobuf types + gRPC service stubs
  # Verified against buf.build BSR — 2026-07-02 (Phase 22, D-03: source-distributed,
  # committed stubs — PHP consumers lack protoc+grpc_php_plugin locally). The `buf`
  # CLI is unavailable in this development environment (consistent with every prior
  # SDK phase); Task 1 of 22-05-PLAN.md instead used a local
  # `protoc --php_out=<scratch> -I proto proto/axiam/v1/authorization.proto` invocation
  # (protoc 3.21.12 ships native --php_out message codegen; no grpc_php_plugin was
  # available to generate a service-client stub, so `AuthzGrpcClient` in
  # `sdks/php/src/Grpc/AuthzGrpcClient.php` hand-implements the two RPCs directly via
  # `Grpc\BaseStub::_simpleRequest()`, the same mechanism grpc_php_plugin's generated
  # client classes use internally). `proto/axiam/v1/authorization.proto` carries
  # PHP-only `php_namespace`/`php_metadata_namespace` file options (ignored by every
  # other language's codegen) so generated classes land under `Axiam\Sdk\Grpc\Gen`
  # (sdks/php/src/Grpc/Gen/, matching the PSR-4 `Axiam\Sdk\` -> `src/` root) instead of
  # protoc's package-derived default `Axiam\V1`. See sdks/php/src/Grpc/Gen/ for the
  # committed output and 22-05-SUMMARY.md for the exact reproducible command.
  - remote: buf.build/protocolbuffers/php
    out: php/src/Grpc/Gen
  - remote: buf.build/grpc/php
    out: php/src/Grpc/Gen

  # Java: DRIFT-CHECK-ONLY, documentation reference — NOT the authoritative
  # Java codegen path (Phase 20 D-21 / RESEARCH.md Pitfall 1). The `buf` CLI
  # is unavailable in this development environment; Java's actual gRPC
  # codegen is `mvn -f sdks/java/pom.xml generate-sources` via
  # protobuf-maven-plugin + os-maven-plugin, which self-downloads protoc/
  # protoc-gen-grpc-java and outputs into the gitignored
  # sdks/java/target/generated-sources/protobuf (never the committed source
  # tree). These two entries are commented out on purpose: an active
  # `out: java/src/main/java` here would write generated stubs directly into
  # the committed source tree, conflicting with D-21's generate-on-build/
  # gitignored/bundle-compiled-into-jar model. Uncomment only for an
  # optional CI drift-check comparing buf's output against the Maven build's
  # output — never as the build's actual source of generated code.
  # - remote: buf.build/protocolbuffers/java
  #   out: java/src/main/java
  # - remote: buf.build/grpc/java
  #   out: java/src/main/java

